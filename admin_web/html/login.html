<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>

  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>

  <div class="login-page">
    <div class="login-container">

      <div class="logo-box">
        <img src="../assets/logo.png" alt="logo">
      </div>

      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Welcome to School Management System</p>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
          <label for="password">Password</label>

          <div class="password-box">
            <input type="password" id="password" placeholder="Enter password">

            <span id="togglePassword" class="eye-icon">
              <!-- eye open -->
              <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M2 12C3.8 8.9 7.2 6.5 12 6.5C16.8 6.5 20.2 8.9 22 12C20.2 15.1 16.8 17.5 12 17.5C7.2 17.5 3.8 15.1 2 12Z" stroke="#A3A3A3" stroke-width="1.8"/>
                <circle cx="12" cy="12" r="3" stroke="#A3A3A3" stroke-width="1.8"/>
              </svg>

              <!-- eye close -->
              <svg id="eyeClose" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" style="display: none;">
                <path d="M3 3L21 21" stroke="#A3A3A3" stroke-width="1.8"/>
                <path d="M10.58 10.58A2 2 0 0012 14A2 2 0 0013.42 13.42" stroke="#A3A3A3" stroke-width="1.8"/>
                <path d="M6.71 6.7C4.68 8 3.12 9.84 2 12C3.8 15.1 7.2 17.5 12 17.5C14.03 17.5 15.81 17.07 17.34 16.34" stroke="#A3A3A3" stroke-width="1.8"/>
                <path d="M9.53 4.8C10.31 4.6 11.13 4.5 12 4.5C16.8 4.5 20.2 6.9 22 10C21.31 11.18 20.45 12.22 19.41 13.12" stroke="#A3A3A3" stroke-width="1.8"/>
              </svg>
            </span>
          </div>
        </div>

        <div class="forgot">
          <a href="#">Forgot Your Password?</a>
        </div>

        <button type="submit" class="btn-login">Login</button>

        <p id="error" class="error"></p>
      </form>

    </div>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
